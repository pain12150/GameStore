<article class="game-card" [class.is-unavailable]="!game.available">
  <div class="card-glow"></div>
  
  <div class="card-body">
    <div class="card-header">
      <span class="game-id">#{{ game.id }}</span>
      <span class="price-tag">${{ game.price | number:'1.2-2' }}</span>
    </div>
    
    <h2 class="game-title">{{ game.title }}</h2>
    
    <!-- Custom pipe demonstrating key formatting inside child component -->
    <div class="demo-key-container">
      <span class="key-label">Demo License Key:</span>
      <code class="key-code">{{ mockKey | keyFormat }}</code>
    </div>
    
    <div class="card-footer">
      @if (game.available) {
        <span class="status-badge status-in-stock">
          <span class="indicator"></span> In Stock
        </span>
      } @else {
        <span class="status-badge status-out-of-stock">
          <span class="indicator"></span> Out of Stock
        </span>
      }
      
      <div class="card-actions-wrapper">
        <div class="card-actions">
          <a [routerLink]="['/games', game.id]" class="btn-link">View Details</a>
          <button (click)="addToCart()" class="btn-cart">Add to Cart</button>
          <button (click)="toggleAvailability()" class="btn-action">
            Toggle Status
          </button>
        </div>
        <button (click)="onRemoveClick()" class="btn-remove">
          <span class="remove-icon">🗑</span> Remove from inventory
        </button>
      </div>
    </div>
  </div>
</article>
