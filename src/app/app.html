<main class="min-h-screen bg-[#07080f] py-8 px-4 flex flex-col items-center">
  <!-- Dynamic Navigation Header -->
  <header class="app-header w-full max-w-5xl">
    <div class="header-logo">
      <span class="logo-emoji">⚡</span>
      <h1 class="logo-text">GameKey Store</h1>
    </div>
    <nav class="header-nav">
      <!-- routerLinkActive applies active-link CSS class if route matches URL -->
      <a routerLink="/games" routerLinkActive="active-link" class="nav-link">
        <span class="nav-dot"></span> Catalog Inventory
      </a>
      <a routerLink="/games/add" routerLinkActive="active-link" class="nav-link">
        <span class="nav-dot"></span> Add Game
      </a>

      <!-- Cart summary badge reading from public signals -->
      <div class="cart-summary">
        <span class="cart-icon">🛒</span>
        <span class="cart-count"><strong>{{ cartService.totalItems() }}</strong> items</span>
        <span class="cart-divider">|</span>
        <span class="cart-price"><strong>${{ cartService.totalPrice() | number:'1.2-2' }}</strong></span>
      </div>
    </nav>
  </header>

  <!-- router-outlet is the placeholder viewport for routed components -->
  <div class="w-full max-w-5xl">
    <router-outlet></router-outlet>
  </div>

  <footer class="mt-12 mb-6 text-center text-xs text-slate-500 font-medium tracking-wide">
    &copy; 2026 GameKey Store. All rights reserved. Real-time Inventory Portal.
  </footer>
</main>
